# ==============================================================================
# Redis Configuration — Production Ready
# ==============================================================================

# ---------- NETWORK ----------
bind 0.0.0.0
port 6379
protected-mode yes
requirepass change_me
tcp-backlog 511
tcp-keepalive 300
timeout 0

# ---------- GENERAL ----------
daemonize no
loglevel notice
logfile ""
databases 16

# ---------- MEMORY ----------
# Giới hạn Redis sử dụng tối đa 40GB (session, cache, pubsub chỉ cần nhỏ)
maxmemory 40gb
maxmemory-policy allkeys-lru

# ---------- SNAPSHOTTING (RDB Persistence) ----------
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ---------- APPEND ONLY FILE (AOF Persistence) ----------
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
# everysec: fsync mỗi giây — cân bằng giữa performance và durability
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# ---------- SLOW LOG ----------
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---------- LATENCY MONITOR ----------
latency-monitor-threshold 100

# ---------- ADVANCED ----------
# Tối ưu cho production
hz 10
dynamic-hz yes
activedefrag yes
