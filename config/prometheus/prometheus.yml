global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'fastapi-backend'
    static_configs: [{ targets: ['host.docker.internal:9000'] }]

  - job_name: 'fastapi-parser'
    static_configs: [{ targets: ['host.docker.internal:8005'] }]

  - job_name: 'fastapi-embedding'
    static_configs: [{ targets: ['host.docker.internal:8006'] }]

  - job_name: 'vllm'
    static_configs: [{ targets: ['host.docker.internal:8007'] }]

  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs: [{ targets: ['qdrant:6333'] }]

  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs: [{ targets: ['minio:9000'] }]

  - job_name: 'postgres'
    static_configs: [{ targets: ['postgres_exporter:9187'] }]

  - job_name: 'redis'
    static_configs: [{ targets: ['redis_exporter:9121'] }]

  - job_name: 'node_exporter'
    static_configs: [{ targets: ['node_exporter:9100'] }]

  - job_name: 'gpu_metrics'
    static_configs: [{ targets: ['dcgm_exporter:9400'] }]