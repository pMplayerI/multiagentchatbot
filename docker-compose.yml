# ==============================================================================
# Docker Compose — Chatbot Multi-Agent BachViet
# ==============================================================================
# Kiến trúc:
#   - Backend: FastAPI (Python)    → port 9000
#   - Frontend: Next.js            → port 9002
#   - PDF Parser: Marker (GPU)     → port 8001
#   - BGE Embed/Rerank (GPU)       → port 8002
#   - PostgreSQL + Adminer         → port 7000, 7001
#   - Qdrant Vector DB             → port 7002
#   - MinIO Object Storage         → port 7003, 7004
#   - Redis + Redis Insight        → port 7005, 7006
# ==============================================================================

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "7"



services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "7000:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-multiangent_db}
    volumes:
      - ./cache/pgdata:/var/lib/postgresql/data

  # --- PgBouncer (Connection Pooler) ---
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6432:5432"
    environment:
      DB_USER: ${POSTGRES_USER:-bao}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-multiangent_db}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 50
      AUTH_TYPE: scram-sha-256
    depends_on:
      - postgres

  # --- Adminer (Database UI) ---
  db_ui:
    image: adminer
    container_name: chatbot_db_ui
    restart: always
    logging: *default-logging
    ports:
      - "7001:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-bao}:${POSTGRES_PASSWORD:-change_me}@pgbouncer:5432/${POSTGRES_DB:-multiangent_db}?sslmode=disable"
    ports:
      - "9187:9187"
    deploy:
      resources:
        limits:
          cpus: '0.1'   
          memory: 128M
    depends_on:
      - postgres

  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "7002:6333"
    volumes:
      - ./cache/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__WEB_ENABLE=true

  # --- MinIO Object Storage (lưu file gốc) ---
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: minio
    restart: unless-stopped
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: minio server /data --console-address ":9001"
    ports:
      - "7003:9000"
      - "7004:9001"
    volumes:
      - ./cache/minio:/data

  # --- Redis (Cache / Session / Queue) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "7005:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me}
    volumes:
      - ./cache/redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: sh -c 'redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"'
    deploy:
      resources:
        limits:
          memory: 40g
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Redis Insight (Redis GUI) ---
  redis_insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "7006:5540"
    depends_on:
      redis:
        condition: service_healthy

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis_exporter
    restart: unless-stopped
    logging: *default-logging
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me}
    ports:
      - "9121:9121"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    depends_on:
      - redis

  # --- Prometheus Monitoring (Giới hạn RAM 512M) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: root
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "7007:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/prometheus:/etc/prometheus
      - ./cache/prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=3d'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # --- Node Exporter (Giám sát Hạ tượng Máy chủ) ---
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9100:9100"
    volumes:
      # Mount các thư mục lõi của hệ điều hành Host vào trong container (chỉ đọc)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      # Bỏ qua các ổ đĩa ảo của Docker để đo chính xác dung lượng ổ cứng vật lý
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  # --- Giám sát phần cứng GPU NVIDIA ---
  dcgm_exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
    container_name: dcgm_exporter
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        # 1. Ép giới hạn tài nguyên khắt khe (Hard Limits)
        limits:
          cpus: '0.2'      # Chỉ cho phép chạy tối đa 20% của 1 core CPU
          memory: 128M     # Tuyệt đối không được dùng quá 128MB RAM Host
        # 2. Cấp quyền đọc thông số GPU
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "9400:9400"

  # --- vLLM (Inference Server) ---
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: ${VLLM_CONTAINER_NAME:-vllm_server}
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${VLLM_HOST_PORT:-8007}:8000"
    volumes:
      - ${HF_CACHE_MOUNT}:/root/.cache/huggingface
      - ./config/vllm/tool_chat_template_gemma4_no_reasoning.jinja:/config/vllm/tool_chat_template_gemma4_no_reasoning.jinja:ro
    shm_size: '16gb'
    # Command config: model name, memory usage, context length, tool calling
    command: >
      --model ${VLLM_MODEL_NAME}
      --gpu-memory-utilization ${GPU_MEMORY_UTIL:-0.37}
      --max-model-len ${LLM_CONTEXT_WINDOW:-65536}
      --dtype bfloat16
      --trust-remote-code
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --chat-template /config/vllm/tool_chat_template_gemma4_no_reasoning.jinja
      --limit-mm-per-prompt '{"image":0,"audio":0}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --- SearxNG (Open Web Search Engine) ---
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${SEARXNG_BIND_ADDR:-127.0.0.1}:8080:8080"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change_me}
      INSTANCE_NAME: RAG Web Search
      REDIS_URL: ${SEARXNG_REDIS_URL:-redis://:change_me@redis:6379/1}

  # --- Nginx Reverse Proxy ---
  # Dùng khi frontend/backend chạy local bằng code (không public backend trực tiếp).
  # Frontend local: host.docker.internal:3000
  # Backend local: host.docker.internal:9000
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${NGINX_PUBLIC_PORT:-3000}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NGINX_FRONTEND_UPSTREAM: ${NGINX_FRONTEND_UPSTREAM:-host.docker.internal:3100}
      NGINX_BACKEND_UPSTREAM: ${NGINX_BACKEND_UPSTREAM:-host.docker.internal:9000}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-50m}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-3600s}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-3600s}
    volumes:
      - ./config/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

# =============================================================================
# NETWORK
# =============================================================================

networks:
  default:
    driver: bridge
