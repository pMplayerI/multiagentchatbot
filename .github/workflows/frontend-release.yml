name: Frontend Release

on:
  push:
    tags:
      - "frontend-v*"
  workflow_dispatch:

concurrency:
  group: frontend-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  verify-frontend:
    name: Verify frontend before release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  build-and-push-frontend-images:
    name: Build and push frontend images
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: verify-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "IMAGE_BASE=ghcr.io/${{ github.repository_owner }}/rag-chat-frontend" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/rag_chatbot_server_frontend_amd.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}-amd64

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/rag_chatbot_server_frontend_arm.Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}-arm64
